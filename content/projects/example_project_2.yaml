title: "MSU Curriculum Mapping & Dependency Visualization"

short_summary: >
  Built a system to parse, clean, and visualize course prerequisite data
  at Michigan State University as an interactive directed graph. The tool
  helps reveal curriculum structure, bottleneck courses, and student
  pathways across programs.

tech_stack:
  - Python
  - pandas
  - NetworkX
  - Plotly
  - matplotlib
  - Jupyter Notebooks

problem_statement: >
  MSU's course prerequisite and co-requisite data is messy and
  unstructured, making it difficult to understand how courses connect
  across a degree program. Advisors and researchers lacked a clear
  visual picture of curriculum dependencies and which courses act as
  critical bottlenecks for students.

approach: >
  Cleaned and standardized raw registrar data, then parsed prerequisite
  logic using regular expressions to extract structured course
  relationships. Constructed a directed graph with NetworkX and built
  both static and interactive visualizations. Developed a reusable Python
  API so the pipeline can be applied to any MSU major's data.

results_impact: >
  Delivered a working API and interactive curriculum graph covering CNS
  majors, with a web-based UI prototype. The tool enables exploration of
  course dependency chains and DFW rate patterns across the curriculum.
  Project completed as a capstone collaboration with an MSU academic unit
  sponsor.

