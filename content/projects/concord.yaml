title: "Educational Log Analysis Toolkit"

short_summary: >
  Extended and maintain a Python toolkit for processing large educational
  log files from Concord Consortium tools. Added a new script to clean
  messy student text responses (removing HTML, encoding issues, and copied
  text), made the entire toolkit Mac-compatible, and keep scripts operational
  as file formats evolve.

tech_stack:
  - Python
  - pandas
  - JSON/CSV parsing
  - Regular expressions
  - Command-line tools
  - Cross-platform development (Windows → Mac)

problem_statement: >
  Educational platforms generate messy log files with nested JSON and
  unreadable student text responses (encoding errors, HTML tags, copied
  content). The existing toolkit was Windows-only and lacked text cleaning.
  Researchers needed a cross-platform solution to analyze genuine student
  writing.

approach: >
  Extended the existing Python toolkit by adding a student text response
  cleaner that detects and strips copied text from shared classroom tiles,
  removes HTML formatting, and normalizes encoding. Ported the entire
  toolkit from Windows-only to Mac-compatible. Maintain all scripts
  (date analysis, file splitting, JSON extraction, de-identification)
  to handle schema changes over multiple semesters.

results_impact: >
  The text cleaner now automatically processes 100,000+ record datasets,
  outputting separate files for original vs. total student writing. Mac
  compatibility expanded the toolkit's user base to the whole research
  team. Maintained ~4x speedup over manual processing while enabling
  privacy-compliant data sharing.

